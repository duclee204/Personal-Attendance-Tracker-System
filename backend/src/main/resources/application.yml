server:
  port: ${PORT:8080}

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${DATABASE_HOST:${PGHOST:localhost}}:${DATABASE_PORT:${PGPORT:5432}}/${DATABASE_NAME:${PGDATABASE:personal_attendance}}}
    username: ${DATABASE_USERNAME:${PGUSER:admin}}
    password: ${DATABASE_PASSWORD:${PGPASSWORD:}}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  cors:
    allowed-origins: ${FRONTEND_ORIGIN:http://localhost:5173,https://attendance.ducit.io.vn}
